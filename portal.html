<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Academy Madavoor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        :root { --primary-blue: #003b8e; --light-blue: #0056d6; --bg-color: #f4f7f6; --white: #ffffff; --text-dark: #1a2a3a; --danger: #ef4444; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; justify-content: center; }

        #app-container { width: 100%; max-width: 450px; min-height: 100vh; background: var(--bg-color); position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding-bottom: 80px; }
        header { background: var(--primary-blue); color: var(--white); padding: 20px; text-align: center; font-size: 1.2rem; font-weight: 700; box-shadow: 0 4px 10px rgba(0,59,142,0.2); position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; }
        #logout-btn { display: none; background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }

        .filter-bar { background: var(--white); padding: 15px; display: none; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 68px; z-index: 15; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; }
        .filter-select { flex: 1; padding: 10px; border: 1px solid #ccd6e0; border-radius: 8px; font-size: 0.9rem; font-weight: 600; color: var(--primary-blue); outline: none; background: #f8fafc; }

        .screen { padding: 20px; display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }

        .login-box { background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-top: 50px; }
        .login-box h2 { text-align: center; margin-bottom: 20px; color: var(--primary-blue); }
        .form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; background: var(--primary-blue); color: var(--white); border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }

        .card { background: var(--white); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 4px solid var(--primary-blue); position: relative;}
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        .card h3 { font-size: 1.1rem; color: var(--text-dark); max-width: 70%; }
        .batch-badge { background: var(--bg-color); color: var(--primary-blue); padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: 700; border: 1px solid #ccd6e0;}
        
        /* Delete Button */
        .btn-delete { background: none; border: none; color: var(--danger); font-size: 1.1rem; cursor: pointer; padding: 5px; transition: 0.2s; }
        .btn-delete:hover { transform: scale(1.1); }

        .action-btns { display: flex; gap: 10px; }
        .btn-present, .btn-absent { border: none; padding: 10px 15px; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; flex: 1; }
        .btn-present { background-color: var(--success); }
        .btn-absent { background-color: var(--danger); }
        .status-tag { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; font-weight: 600; display: none; text-align: center; width: 100%;}
        .tag-present { background: #d1fae5; color: #065f46; display: block; }
        .tag-absent { background: #fee2e2; color: #991b1b; display: block; }
        
        .fee-stats { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 15px; }
        .fee-stats div { text-align: center; }
        .fee-val { font-weight: 700; font-size: 1.1rem; display: block; }
        .text-danger { color: var(--danger); }
        .text-success { color: var(--success); }
        .btn-pay { width: 100%; background: var(--bg-color); color: var(--primary-blue); border: 2px solid var(--primary-blue); padding: 8px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;}
        .btn-pay:hover { background: var(--primary-blue); color: var(--white); }

        .admin-form { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .admin-form label { font-size: 0.9rem; font-weight: 600; color: #555; margin-bottom: 5px; display: block;}
        .form-row { display: flex; gap: 10px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--white); display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); display: none; border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 20; }
        .nav-item { text-align: center; color: #888; cursor: pointer; transition: 0.3s; width: 33%;}
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 5px; }
        .nav-item span { font-size: 0.75rem; font-weight: 600; }
        .nav-item.active { color: var(--primary-blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <span>Academy Madavoor</span>
            <button id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
        </header>

        <div class="filter-bar" id="filter-bar">
            <select class="filter-select" id="class-filter" onchange="loadData()">
                <option value="All">All Classes</option>
                <option value="8th">Class 8</option>
                <option value="9th">Class 9</option>
                <option value="10th">Class 10</option>
            </select>
            <select class="filter-select" id="batch-filter" onchange="loadData()">
                <option value="All">All Batches</option>
                <option value="A1">Batch A1</option>
                <option value="A2">Batch A2</option>
                <option value="B1">Batch B1</option>
            </select>
        </div>

        <div id="login-screen" class="screen active">
            <div class="login-box">
                <h2>Staff Login</h2>
                <input type="email" id="email" class="form-control" placeholder="Email Address">
                <input type="password" id="password" class="form-control" placeholder="Password">
                <button class="btn" onclick="login()">Login</button>
                <p id="error-msg" style="color: red; text-align: center; margin-top: 10px; font-size: 0.9rem;"></p>
            </div>
        </div>

        <div id="attendance-screen" class="screen">
            <div id="attendance-list"><div style="text-align: center; color: #888;">Select a Class & Batch...</div></div>
        </div>

        <div id="fees-screen" class="screen">
            <div id="fees-list"><div style="text-align: center; color: #888;">Select a Class & Batch...</div></div>
        </div>

        <div id="add-screen" class="screen">
            <h2 style="font-size: 1.2rem; color: var(--primary-blue); margin-bottom: 15px;"><i class="fas fa-user-plus"></i> Add New Admission</h2>
            <div class="admin-form">
                <label>Student Name</label>
                <input type="text" id="new-name" class="form-control" placeholder="Full Name" required>
                
                <label>WhatsApp Number</label>
                <input type="tel" id="new-phone" class="form-control" placeholder="10-digit number" required>
                
                <div class="form-row">
                    <div style="flex: 1;">
                        <label>Class</label>
                        <select id="new-class" class="form-control">
                            <option value="8th">Class 8</option>
                            <option value="9th">Class 9</option>
                            <option value="10th">Class 10</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Batch</label>
                        <select id="new-batch" class="form-control">
                            <option value="A1">A1</option>
                            <option value="A2">A2</option>
                            <option value="B1">B1</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div style="flex: 1;">
                        <label>Total Course Fee</label>
                        <input type="number" id="new-total" class="form-control" placeholder="₹" value="5000" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Advance Paid</label>
                        <input type="number" id="new-paid" class="form-control" placeholder="₹" value="0" required>
                    </div>
                </div>

                <button class="btn" onclick="addNewStudent()" style="margin-top: 10px;"><i class="fas fa-save"></i> Save Student</button>
            </div>
        </div>

        <nav class="bottom-nav" id="bottom-nav">
            <div class="nav-item active" onclick="switchTab('attendance')">
                <i class="fas fa-calendar-check"></i><span>Attendance</span>
            </div>
            <div class="nav-item" onclick="switchTab('fees')">
                <i class="fas fa-rupee-sign"></i><span>Fees</span>
            </div>
            <div class="nav-item" onclick="switchTab('add')">
                <i class="fas fa-plus-circle"></i><span>Add Student</span>
            </div>
        </nav>
    </div>

    <script>
        // =========================================================
        // YOUR EXACT FIREBASE KEYS (Pre-filled for you!)
        // =========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDNo7xIyzmcAhOjjnjB5JF2eTiIXY5kfJg",
            authDomain: "academy-madavoor-portal.firebaseapp.com",
            projectId: "academy-madavoor-portal",
            storageBucket: "academy-madavoor-portal.firebasestorage.app",
            messagingSenderId: "883093460593",
            appId: "1:883093460593:web:489d90f93fa78eb3e1add0"
        };
        // =========================================================

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('attendance-screen').classList.add('active');
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('bottom-nav').style.display = 'flex';
                document.getElementById('filter-bar').style.display = 'flex'; 
                loadData(); 
            } else {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('login-screen').classList.add('active');
                document.getElementById('logout-btn').style.display = 'none';
                document.getElementById('bottom-nav').style.display = 'none';
                document.getElementById('filter-bar').style.display = 'none'; 
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('filter-bar').style.display = (tab === 'add') ? 'none' : 'flex';

            if(tab === 'attendance') {
                document.getElementById('attendance-screen').classList.add('active');
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                loadData();
            } else if(tab === 'fees') {
                document.getElementById('fees-screen').classList.add('active');
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                loadData();
            } else if(tab === 'add') {
                document.getElementById('add-screen').classList.add('active');
                document.querySelectorAll('.nav-item')[2].classList.add('active');
            }
        }

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            document.getElementById('error-msg').innerText = "Logging in...";
            auth.signInWithEmailAndPassword(email, password).catch(err => {
                document.getElementById('error-msg').innerText = "Error: " + err.message;
            });
        }

        document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());

        function loadData() {
            const classFilter = document.getElementById('class-filter').value;
            const batchFilter = document.getElementById('batch-filter').value;
            const today = new Date().toISOString().split('T')[0];
            
            const attList = document.getElementById('attendance-list');
            const feeList = document.getElementById('fees-list');
            
            attList.innerHTML = '<div style="text-align: center; color: #888;">Fetching students...</div>'; 
            feeList.innerHTML = '<div style="text-align: center; color: #888;">Fetching students...</div>';

            db.collection("Attendance").where("date", "==", today).get().then((attSnapshot) => {
                let markedToday = {};
                attSnapshot.forEach(doc => { markedToday[doc.data().studentId] = doc.data().status; });

                db.collection("Students").get().then((querySnapshot) => {
                    attList.innerHTML = ''; feeList.innerHTML = '';
                    let matchCount = 0;

                    let studentsArray = [];
                    querySnapshot.forEach(doc => studentsArray.push({ id: doc.id, ...doc.data() }));
                    studentsArray.sort((a, b) => a.Name.localeCompare(b.Name));

                    studentsArray.forEach((student) => {
                        if (classFilter !== 'All' && student.Class !== classFilter) return;
                        if (batchFilter !== 'All' && student.Batch !== batchFilter) return;

                        matchCount++;

                        const totalFee = Number(student.TotalFee) || 0;
                        const paidFee = Number(student.PaidFee) || 0;
                        const pendingFee = totalFee - paidFee;
                        const displayBatch = student.Batch || "No Batch";

                        let actionButtonsHtml = '';
                        let statusTagHtml = '';

                        if (markedToday[student.id]) {
                            const status = markedToday[student.id];
                            const tagClass = status === 'Present' ? 'tag-present' : 'tag-absent';
                            actionButtonsHtml = `<div class="action-btns" id="btns-${student.id}" style="display:none;"></div>`;
                            statusTagHtml = `<span id="status-${student.id}" class="status-tag ${tagClass}">Marked: ${status}</span>`;
                        } else {
                            actionButtonsHtml = `
                                <div class="action-btns" id="btns-${student.id}">
                                    <button class="btn-present" onclick="markAttendance('${student.id}', '${student.Name}', 'Present')">Present</button>
                                    <button class="btn-absent" onclick="markAttendance('${student.id}', '${student.Name}', 'Absent')">Absent</button>
                                </div>`;
                            statusTagHtml = `<span id="status-${student.id}" class="status-tag"></span>`;
                        }

                        // Attendance Card (With Delete Button)
                        attList.innerHTML += `
                            <div class="card">
                                <div class="card-header">
                                    <h3>${student.Name}</h3>
                                    <div>
                                        <span class="batch-badge">${student.Class} - ${displayBatch}</span>
                                        <button class="btn-delete" onclick="deleteStudent('${student.id}', '${student.Name}')"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                                ${actionButtonsHtml}
                                ${statusTagHtml}
                            </div>`;

                        // Fee Card (With Delete Button)
                        feeList.innerHTML += `
                            <div class="card">
                                <div class="card-header">
                                    <h3>${student.Name}</h3>
                                    <div>
                                        <span class="batch-badge">${student.Class} - ${displayBatch}</span>
                                        <button class="btn-delete" onclick="deleteStudent('${student.id}', '${student.Name}')"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                                <div class="fee-stats">
                                    <div><span style="color:#888;">Total</span><span class="fee-val">₹${totalFee}</span></div>
                                    <div><span style="color:#888;">Paid</span><span class="fee-val text-success">₹${paidFee}</span></div>
                                    <div><span style="color:#888;">Pending</span><span class="fee-val text-danger">₹${pendingFee}</span></div>
                                </div>
                                <button class="btn-pay" onclick="recordPayment('${student.id}', '${student.Name}', ${paidFee}, ${pendingFee})">
                                    Record Payment
                                </button>
                            </div>`;
                    });

                    if(matchCount === 0) {
                        const noDataMsg = `<div style="text-align: center; color: #888; padding: 20px;">No students found in this selection.</div>`;
                        attList.innerHTML = noDataMsg;
                        feeList.innerHTML = noDataMsg;
                    }
                });
            });
        }

        function markAttendance(studentId, studentName, status) {
            const today = new Date().toISOString().split('T')[0];
            db.collection("Attendance").doc(`${studentId}_${today}`).set({
                studentId, studentName, date: today, status, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById(`btns-${studentId}`).style.display = 'none';
                const tag = document.getElementById(`status-${studentId}`);
                tag.innerText = "Marked: " + status; 
                tag.className = `status-tag ${status === 'Present' ? 'tag-present' : 'tag-absent'}`;
                tag.style.display = 'block';
            });
        }

        function recordPayment(studentId, studentName, currentPaid, pendingFee) {
            if (pendingFee <= 0) { alert(`${studentName} has already paid the full fee!`); return; }
            const amountStr = prompt(`Recording payment for ${studentName}.\nPending Balance: ₹${pendingFee}\n\nAmount received:`);
            
            if (amountStr !== null && amountStr.trim() !== "") {
                const amountAdded = parseInt(amountStr);
                if (isNaN(amountAdded) || amountAdded <= 0) { alert("Please enter a valid number."); return; }
                
                db.collection("Students").doc(studentId).update({ PaidFee: currentPaid + amountAdded })
                .then(() => { alert(`Success! ₹${amountAdded} recorded for ${studentName}.`); loadData(); })
                .catch(err => { alert("Error recording payment. Check internet."); });
            }
        }

        function addNewStudent() {
            const name = document.getElementById('new-name').value.trim();
            const phone = document.getElementById('new-phone').value.trim();
            const cls = document.getElementById('new-class').value;
            const batch = document.getElementById('new-batch').value;
            const total = Number(document.getElementById('new-total').value);
            const paid = Number(document.getElementById('new-paid').value);

            if(!name || !phone) { alert("Name and Phone Number are required!"); return; }

            db.collection("Students").add({
                Name: name, Phone: phone, Class: cls, Batch: batch, TotalFee: total, PaidFee: paid
            }).then(() => {
                alert(`Success! ${name} has been enrolled.`);
                document.getElementById('new-name').value = '';
                document.getElementById('new-phone').value = '';
                document.getElementById('new-paid').value = '0';
                switchTab('attendance');
            }).catch(error => { alert("Error adding student. Please try again."); });
        }

        // =========================================================
        // NEW: TRIPLE-LOCK DELETE FUNCTION
        // =========================================================
        function deleteStudent(studentId, studentName) {
            // Lock 1: Standard Warning
            if (!confirm(`⚠️ FIRST WARNING:\nAre you sure you want to delete ${studentName}?`)) return;

            // Lock 2: Type Confirmation
            let checkWord = prompt(`⚠️ SECOND WARNING:\nType the word DELETE (in all caps) to confirm you want to remove ${studentName}.`);
            if (checkWord !== "DELETE") {
                alert("Deletion cancelled.");
                return;
            }

            // Lock 3: Admin Password Verification
            let pwd = prompt(`🔐 FINAL SECURITY CHECK:\nEnter your Admin Login Password to permanently delete ${studentName}.`);
            if (pwd === null || pwd.trim() === "") {
                alert("Password required. Deletion cancelled.");
                return;
            }

            // Verify Password using Firebase Auth
            const userEmail = auth.currentUser.email;
            auth.signInWithEmailAndPassword(userEmail, pwd)
                .then(() => {
                    // Password correct! Delete the document.
                    db.collection("Students").doc(studentId).delete().then(() => {
                        alert(`✅ ${studentName} has been permanently deleted from the database.`);
                        loadData(); // Refresh the screen
                    }).catch(err => {
                        alert("Error deleting student from database. Please check your connection.");
                    });
                })
                .catch(err => {
                    alert("❌ Incorrect Password. Deletion blocked.");
                });
        }
    </script>
</body>
</html>
