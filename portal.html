<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Academy Madavoor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        :root { --primary-blue: #003b8e; --light-blue: #0056d6; --bg-color: #f4f7f6; --white: #ffffff; --text-dark: #1a2a3a; --danger: #ef4444; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; justify-content: center; }

        #app-container { width: 100%; max-width: 450px; min-height: 100vh; background: var(--bg-color); position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding-bottom: 80px; }
        header { background: var(--primary-blue); color: var(--white); padding: 20px; text-align: center; font-size: 1.2rem; font-weight: 700; box-shadow: 0 4px 10px rgba(0,59,142,0.2); position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px;}
        #logout-btn { display: none; background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }

        .screen { padding: 20px; display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }

        /* Login */
        .login-box { background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-top: 50px; }
        .login-box h2 { text-align: center; margin-bottom: 20px; color: var(--primary-blue); }
        .form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; background: var(--primary-blue); color: var(--white); border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s;}
        
        /* Dashboard & Folders */
        .greeting { font-size: 1.3rem; font-weight: 700; color: var(--text-dark); margin-bottom: 20px; }
        .class-group { margin-bottom: 25px; }
        .class-title { font-size: 1.1rem; color: #555; margin-bottom: 10px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        .folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .folder-card { background: var(--white); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .folder-card:hover { border-color: var(--primary-blue); transform: translateY(-3px); }
        .folder-card i { font-size: 2rem; color: var(--light-blue); margin-bottom: 10px; }
        .folder-card h4 { color: var(--text-dark); font-size: 1.1rem; }
        .folder-card p { font-size: 0.8rem; color: #888; margin-top: 5px; }

        /* Batch View Header */
        .batch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { background: #e2e8f0; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #333; }
        
        /* NEW: Date Picker Box */
        .date-picker-box { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 4px solid var(--primary-blue); }
        .date-picker-box input { border: 1px solid #ccc; padding: 6px 10px; border-radius: 6px; font-family: inherit; font-weight: 600; color: var(--primary-blue); outline: none; }

        .tab-toggles { display: flex; background: #e2e8f0; border-radius: 8px; padding: 4px; margin-bottom: 20px;}
        .tab-btn { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 6px; font-weight: 600; cursor: pointer; color: #555;}
        .tab-btn.active { background: var(--white); color: var(--primary-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Cards */
        .card { background: var(--white); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 4px solid var(--primary-blue); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        .card h3 { font-size: 1.1rem; color: var(--text-dark); }
        .badge { background: #e2e8f0; color: #555; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: 700; }
        
        /* Directory Specific */
        .search-bar { display: flex; background: white; border-radius: 8px; padding: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #ddd;}
        .search-bar input { border: none; outline: none; padding: 10px; flex: 1; font-size: 1rem; }
        .search-bar i { padding: 12px; color: #888; }
        .dir-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-edit { background: #fef08a; color: #854d0e; border: none; padding: 8px; border-radius: 6px; flex: 1; font-weight: 600; cursor: pointer; }
        .btn-del { background: #fecaca; color: #991b1b; border: none; padding: 8px; border-radius: 6px; flex: 1; font-weight: 600; cursor: pointer; }

        /* Attendance & Fees Elements */
        .action-btns { display: flex; gap: 10px; margin-bottom: 8px;}
        .btn-present, .btn-absent { border: none; padding: 10px 15px; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; flex: 1; }
        .btn-present { background-color: var(--success); }
        .btn-absent { background-color: var(--danger); }
        .status-tag { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; font-weight: 600; display: inline-block; text-align: center; width: 100%; margin-bottom: 8px;}
        .tag-present { background: #d1fae5; color: #065f46; }
        .tag-absent { background: #fee2e2; color: #991b1b; }
        
        /* History Button */
        .btn-history { width: 100%; background: #e2e8f0; color: #333; border: none; padding: 8px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem;}
        .btn-history:hover { background: #cbd5e1; }

        .fee-stats { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 15px; }
        .fee-stats div { text-align: center; }
        .fee-val { font-weight: 700; font-size: 1.1rem; display: block; }
        .text-danger { color: var(--danger); }
        .text-success { color: var(--success); }
        .btn-pay { width: 100%; background: var(--bg-color); color: var(--primary-blue); border: 2px solid var(--primary-blue); padding: 8px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;}

        /* Admin Form */
        .admin-form { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .admin-form label { font-size: 0.9rem; font-weight: 600; color: #555; margin-bottom: 5px; display: block;}
        .form-row { display: flex; gap: 10px; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; display: none; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto;}
        .modal-close { float: right; cursor: pointer; font-size: 1.2rem; color: #888; }
        
        /* History Items inside Modal */
        .history-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #f0f0f0; }
        .history-item:last-child { border-bottom: none; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--white); display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); display: none; border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 20; }
        .nav-item { text-align: center; color: #888; cursor: pointer; transition: 0.3s; width: 33%;}
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 5px; }
        .nav-item span { font-size: 0.75rem; font-weight: 600; }
        .nav-item.active { color: var(--primary-blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <span>Academy Madavoor</span>
            <button id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
        </header>

        <div id="login-screen" class="screen active">
            <div class="login-box">
                <h2>Staff Login</h2>
                <input type="email" id="email" class="form-control" placeholder="Email Address">
                <input type="password" id="password" class="form-control" placeholder="Password">
                <button class="btn" onclick="login()">Login</button>
                <p id="error-msg" style="color: red; text-align: center; margin-top: 10px; font-size: 0.9rem;"></p>
            </div>
        </div>

        <div id="dashboard-screen" class="screen">
            <div class="greeting" id="admin-greeting">Hey, Admin! 👋</div>
            <div id="folders-container">
                <div style="text-align: center; color: #888; padding: 20px;">Loading batches...</div>
            </div>
        </div>

        <div id="batch-screen" class="screen">
            <div class="batch-header">
                <button class="back-btn" onclick="switchTab('dashboard')"><i class="fas fa-arrow-left"></i> Back</button>
                <h2 id="current-batch-title" style="font-size: 1.2rem; color: var(--primary-blue); margin: 0 10px;">Class - Batch</h2>
                <button onclick="deleteCurrentBatch()" style="background: none; border: none; color: var(--danger); font-size: 1.3rem; cursor: pointer; transition: 0.2s;" title="Delete Entire Batch"><i class="fas fa-trash-alt"></i></button>
            </div>
            
            <div class="date-picker-box" id="attendance-date-box">
                <span style="font-weight: 600; color: #555; font-size: 0.9rem;"><i class="fas fa-calendar-day"></i> View Date:</span>
                <input type="date" id="view-date" onchange="changeDate()">
            </div>
            
            <div class="tab-toggles">
                <button class="tab-btn active" id="btn-att" onclick="toggleBatchMode('attendance')">Attendance</button>
                <button class="tab-btn" id="btn-fee" onclick="toggleBatchMode('fees')">Fees</button>
            </div>

            <div id="batch-list-container"></div>
        </div>

        <div id="directory-screen" class="screen">
            <h2 style="font-size: 1.2rem; color: var(--primary-blue); margin-bottom: 15px;"><i class="fas fa-address-book"></i> Student Directory</h2>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search by name or phone..." onkeyup="renderDirectory()">
            </div>
            <div id="directory-list"></div>
        </div>

        <div id="add-screen" class="screen">
            <h2 style="font-size: 1.2rem; color: var(--primary-blue); margin-bottom: 15px;"><i class="fas fa-user-plus"></i> Add New Admission</h2>
            <div class="admin-form">
                <label>Student Name</label>
                <input type="text" id="new-name" class="form-control" placeholder="Full Name">
                <label>WhatsApp Number</label>
                <input type="tel" id="new-phone" class="form-control" placeholder="10-digit number">
                
                <div class="form-row">
                    <div style="flex: 1;">
                        <label>Class</label>
                        <select id="new-class" class="form-control">
                            <option value="8th">8th</option>
                            <option value="9th">9th</option>
                            <option value="10th">10th</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Batch</label>
                        <input type="text" id="new-batch" class="form-control" placeholder="e.g. A1, B2" maxlength="3">
                    </div>
                </div>

                <div class="form-row">
                    <div style="flex: 1;">
                        <label>Total Fee</label>
                        <input type="number" id="new-total" class="form-control" value="5000">
                    </div>
                    <div style="flex: 1;">
                        <label>Advance Paid</label>
                        <input type="number" id="new-paid" class="form-control" value="0">
                    </div>
                </div>

                <button class="btn" onclick="addNewStudent()" style="margin-top: 10px;"><i class="fas fa-save"></i> Save Student</button>
            </div>
        </div>

        <div id="edit-modal" class="modal-overlay">
            <div class="modal-content">
                <i class="fas fa-times modal-close" onclick="closeEditModal()"></i>
                <h3 style="margin-bottom: 15px; color: var(--primary-blue);">Edit Student</h3>
                <input type="hidden" id="edit-id">
                <label style="font-size: 0.8rem; font-weight: 600;">Name</label>
                <input type="text" id="edit-name" class="form-control">
                <label style="font-size: 0.8rem; font-weight: 600;">Phone</label>
                <input type="text" id="edit-phone" class="form-control">
                
                <div class="form-row">
                    <div style="flex: 1;">
                        <label style="font-size: 0.8rem; font-weight: 600;">Class</label>
                        <select id="edit-class" class="form-control">
                            <option value="8th">8th</option>
                            <option value="9th">9th</option>
                            <option value="10th">10th</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.8rem; font-weight: 600;">Batch</label>
                        <input type="text" id="edit-batch" class="form-control" maxlength="3">
                    </div>
                </div>

                <div class="form-row">
                    <div style="flex: 1;">
                        <label style="font-size: 0.8rem; font-weight: 600;">Total Fee</label>
                        <input type="number" id="edit-total" class="form-control">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.8rem; font-weight: 600;">Paid Fee</label>
                        <input type="number" id="edit-paid" class="form-control">
                    </div>
                </div>
                <button class="btn" onclick="saveEdit()"><i class="fas fa-save"></i> Update Details</button>
            </div>
        </div>

        <div id="history-modal" class="modal-overlay">
            <div class="modal-content">
                <i class="fas fa-times modal-close" onclick="closeHistoryModal()"></i>
                <h3 id="history-title" style="margin-bottom: 15px; color: var(--primary-blue);">Attendance History</h3>
                <div id="history-list">
                    <div style="text-align: center; color: #888;">Loading...</div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav" id="bottom-nav">
            <div class="nav-item active" onclick="switchTab('dashboard')">
                <i class="fas fa-home"></i><span>Dashboard</span>
            </div>
            <div class="nav-item" onclick="switchTab('directory')">
                <i class="fas fa-users"></i><span>Directory</span>
            </div>
            <div class="nav-item" onclick="switchTab('add')">
                <i class="fas fa-user-plus"></i><span>New Admit</span>
            </div>
        </nav>
    </div>

    <script>
        // =========================================================
        // FIREBASE CONFIGURATION
        // =========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDNo7xIyzmcAhOjjnjB5JF2eTiIXY5kfJg",
            authDomain: "academy-madavoor-portal.firebaseapp.com",
            projectId: "academy-madavoor-portal",
            storageBucket: "academy-madavoor-portal.firebasestorage.app",
            messagingSenderId: "883093460593",
            appId: "1:883093460593:web:489d90f93fa78eb3e1add0"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global State Variables
        let allStudents = [];
        let markedToday = {};
        let currentViewClass = '';
        let currentViewBatch = '';
        let currentBatchMode = 'attendance';
        
        // NEW: Time Machine Date Tracker
        let selectedDate = new Date().toISOString().split('T')[0];
        let attendanceListenerUnsubscribe = null;

        // Set the date picker to today when page loads
        document.getElementById('view-date').value = selectedDate;

        // =========================================================
        // AUTHENTICATION
        // =========================================================
        auth.onAuthStateChanged(user => {
            if (user) {
                let adminName = user.email.split('@')[0];
                adminName = adminName.charAt(0).toUpperCase() + adminName.slice(1);
                document.getElementById('admin-greeting').innerText = `Hey, ${adminName}! 👋`;

                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('bottom-nav').style.display = 'flex';
                document.getElementById('logout-btn').style.display = 'block';
                
                switchTab('dashboard');
                initRealtimeStudentsSync(); 
                listenToAttendanceForDate(); // Start listening to the chosen date
            } else {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('login-screen').classList.add('active');
                document.getElementById('bottom-nav').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'none';
            }
        });

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            document.getElementById('error-msg').innerText = "Logging in...";
            auth.signInWithEmailAndPassword(email, password).catch(err => {
                document.getElementById('error-msg').innerText = "Error: " + err.message;
            });
        }
        document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());

        // =========================================================
        // NAVIGATION & MODES
        // =========================================================
        function switchTab(tab) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            if(tab === 'dashboard') {
                document.getElementById('dashboard-screen').classList.add('active');
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                renderFolders();
            } else if(tab === 'directory') {
                document.getElementById('directory-screen').classList.add('active');
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                renderDirectory();
            } else if(tab === 'add') {
                document.getElementById('add-screen').classList.add('active');
                document.querySelectorAll('.nav-item')[2].classList.add('active');
            }
        }

        function toggleBatchMode(mode) {
            currentBatchMode = mode;
            document.getElementById('btn-att').className = `tab-btn ${mode === 'attendance' ? 'active' : ''}`;
            document.getElementById('btn-fee').className = `tab-btn ${mode === 'fees' ? 'active' : ''}`;
            
            // Hide date picker if we are looking at fees
            document.getElementById('attendance-date-box').style.display = (mode === 'attendance') ? 'flex' : 'none';
            
            renderBatchList();
        }

        // =========================================================
        // REAL-TIME DATA SYNC (TIME MACHINE UPGRADE)
        // =========================================================
        function initRealtimeStudentsSync() {
            db.collection("Students").onSnapshot((snapshot) => {
                allStudents = [];
                snapshot.forEach(doc => allStudents.push({ id: doc.id, ...doc.data() }));
                allStudents.sort((a, b) => a.Name.localeCompare(b.Name));
                
                if(document.getElementById('dashboard-screen').classList.contains('active')) renderFolders();
                if(document.getElementById('directory-screen').classList.contains('active')) renderDirectory();
                if(document.getElementById('batch-screen').classList.contains('active')) renderBatchList();
            });
        }

        // NEW: Dynamic Attendance Listener
        function listenToAttendanceForDate() {
            // Stop listening to the old date if we switch dates
            if (attendanceListenerUnsubscribe) {
                attendanceListenerUnsubscribe();
            }
            
            // Listen specifically to the date selected in the picker
            attendanceListenerUnsubscribe = db.collection("Attendance")
                .where("date", "==", selectedDate)
                .onSnapshot((snapshot) => {
                    markedToday = {};
                    snapshot.forEach(doc => { markedToday[doc.data().studentId] = doc.data().status; });
                    if(document.getElementById('batch-screen').classList.contains('active')) renderBatchList();
                });
        }

        // Triggered when user changes the date on the screen
        function changeDate() {
            selectedDate = document.getElementById('view-date').value;
            listenToAttendanceForDate(); // Shift the database radar to the new date!
        }

        // =========================================================
        // FOLDER SYSTEM (DASHBOARD)
        // =========================================================
        function renderFolders() {
            const container = document.getElementById('folders-container');
            container.innerHTML = '';

            let grouped = {};
            allStudents.forEach(student => {
                let c = student.Class || "Unknown";
                let b = student.Batch || "Unassigned";
                if(!grouped[c]) grouped[c] = {};
                if(!grouped[c][b]) grouped[c][b] = 0;
                grouped[c][b]++;
            });

            const classOrder = ["8th", "9th", "10th", "Unknown"];
            
            classOrder.forEach(cls => {
                if(grouped[cls]) {
                    let html = `<div class="class-group"><h3 class="class-title">Class ${cls}</h3><div class="folder-grid">`;
                    let batches = Object.keys(grouped[cls]).sort();
                    
                    batches.forEach(batch => {
                        let count = grouped[cls][batch];
                        html += `
                            <div class="folder-card" onclick="openBatchView('${cls}', '${batch}')">
                                <i class="fas fa-folder"></i>
                                <h4>Batch ${batch}</h4>
                                <p>${count} Students</p>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                    container.innerHTML += html;
                }
            });

            if(allStudents.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: #888;">No students found in database.</div>`;
            }
        }

        function openBatchView(cls, batch) {
            currentViewClass = cls;
            currentViewBatch = batch;
            document.getElementById('current-batch-title').innerText = `${cls} - ${batch}`;
            
            // Reset to today when opening a new folder, just to be safe
            selectedDate = new Date().toISOString().split('T')[0];
            document.getElementById('view-date').value = selectedDate;
            changeDate();
            
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('batch-screen').classList.add('active');
            
            renderBatchList();
        }

        // =========================================================
        // BATCH VIEW (ATTENDANCE / FEES)
        // =========================================================
        function renderBatchList() {
            const container = document.getElementById('batch-list-container');
            container.innerHTML = '';
            
            const filtered = allStudents.filter(s => s.Class === currentViewClass && s.Batch === currentViewBatch);

            if(filtered.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: #888;">No students in this batch.</div>`;
                return;
            }

            filtered.forEach(student => {
                if (currentBatchMode === 'attendance') {
                    let actionHtml = '';
                    let historyBtn = `<button class="btn-history" onclick="viewHistory('${student.id}', '${student.Name}')"><i class="fas fa-calendar-alt"></i> View History</button>`;

                    if (markedToday[student.id]) {
                        const status = markedToday[student.id];
                        const tagClass = status === 'Present' ? 'tag-present' : 'tag-absent';
                        actionHtml = `
                            <div style="text-align: center;">
                                <span class="status-tag ${tagClass}">Marked: ${status}</span>
                                ${historyBtn}
                            </div>`;
                    } else {
                        actionHtml = `
                            <div class="action-btns">
                                <button class="btn-present" onclick="markAttendance('${student.id}', '${student.Name}', 'Present')">Present</button>
                                <button class="btn-absent" onclick="markAttendance('${student.id}', '${student.Name}', 'Absent')">Absent</button>
                            </div>
                            ${historyBtn}`;
                    }
                    container.innerHTML += `
                        <div class="card">
                            <h3 style="margin-bottom: 10px;">${student.Name}</h3>
                            ${actionHtml}
                        </div>`;
                } else {
                    const totalFee = Number(student.TotalFee) || 0;
                    const paidFee = Number(student.PaidFee) || 0;
                    const pendingFee = totalFee - paidFee;
                    container.innerHTML += `
                        <div class="card">
                            <h3 style="margin-bottom: 10px;">${student.Name}</h3>
                            <div class="fee-stats">
                                <div><span style="color:#888;">Total</span><span class="fee-val">₹${totalFee}</span></div>
                                <div><span style="color:#888;">Paid</span><span class="fee-val text-success">₹${paidFee}</span></div>
                                <div><span style="color:#888;">Pending</span><span class="fee-val text-danger">₹${pendingFee}</span></div>
                            </div>
                            <button class="btn-pay" onclick="recordPayment('${student.id}', '${student.Name}', ${paidFee}, ${pendingFee})">Record Payment</button>
                        </div>`;
                }
            });
        }

        // =========================================================
        // DIRECTORY (SEARCH, EDIT, DELETE)
        // =========================================================
        function renderDirectory() {
            const container = document.getElementById('directory-list');
            const query = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';

            const filtered = allStudents.filter(s => 
                s.Name.toLowerCase().includes(query) || 
                (s.Phone && s.Phone.includes(query))
            );

            filtered.forEach(student => {
                container.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <h3>${student.Name}</h3>
                            <span class="badge">${student.Class} - ${student.Batch}</span>
                        </div>
                        <p style="font-size:0.85rem; color:#666; margin-bottom:10px;"><i class="fas fa-phone"></i> ${student.Phone}</p>
                        <div class="dir-actions">
                            <button class="btn-edit" onclick="openEditModal('${student.id}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-del" onclick="deleteStudent('${student.id}', '${student.Name}')"><i class="fas fa-trash"></i> Del</button>
                        </div>
                    </div>
                `;
            });
        }

        // =========================================================
        // ACTIONS (ADD, EDIT, DELETE, ATTENDANCE, FEES)
        // =========================================================
        function markAttendance(id, name, status) {
            // BACKDATING UPGRADE: Now it saves it under 'selectedDate' instead of 'today'!
            db.collection("Attendance").doc(`${id}_${selectedDate}`).set({
                studentId: id, studentName: name, date: selectedDate, status: status, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }); 
        }

        function recordPayment(id, name, currentPaid, pending) {
            if (pending <= 0) { alert(`${name} is fully paid!`); return; }
            let amt = parseInt(prompt(`Pending: ₹${pending}\nAmount received:`));
            if (!isNaN(amt) && amt > 0) {
                db.collection("Students").doc(id).update({ PaidFee: currentPaid + amt });
            }
        }

        function addNewStudent() {
            const name = document.getElementById('new-name').value.trim();
            const phone = document.getElementById('new-phone').value.trim();
            const cls = document.getElementById('new-class').value;
            let batch = document.getElementById('new-batch').value.trim().toUpperCase();
            const total = Number(document.getElementById('new-total').value);
            const paid = Number(document.getElementById('new-paid').value);

            if(!name || !phone) { alert("Name and Phone required!"); return; }
            
            if(!/^[A-Z]\d+$/.test(batch)) {
                alert("Invalid Batch format! Please use a letter followed by a number (e.g., A1, B2, C3).");
                return;
            }

            db.collection("Students").add({ Name: name, Phone: phone, Class: cls, Batch: batch, TotalFee: total, PaidFee: paid }).then(() => {
                alert(`${name} added successfully!`);
                document.getElementById('new-name').value = ''; document.getElementById('new-phone').value = ''; document.getElementById('new-batch').value = '';
                switchTab('dashboard');
            });
        }

        function deleteStudent(id, name) {
            if(!confirm(`⚠️ Delete ${name}?`)) return;
            if(prompt(`Type DELETE to confirm removal of ${name}.`) !== "DELETE") return;
            let pwd = prompt(`Admin Password required to delete:`);
            if(pwd) {
                auth.signInWithEmailAndPassword(auth.currentUser.email, pwd).then(() => {
                    db.collection("Students").doc(id).delete().then(() => alert(`${name} deleted.`));
                }).catch(() => alert("❌ Incorrect Password."));
            }
        }

        function deleteCurrentBatch() {
            const batchName = `${currentViewClass} - ${currentViewBatch}`;
            if (!confirm(`⚠️ CRITICAL WARNING:\nAre you sure you want to permanently delete ALL students in ${batchName}?`)) return;
            let checkWord = prompt(`⚠️ SECOND WARNING:\nThis will erase every student in this batch.\nType the word DELETE (in all caps) to confirm.`);
            if (checkWord !== "DELETE") { alert("Batch deletion cancelled."); return; }
            let pwd = prompt(`🔐 FINAL SECURITY CHECK:\nEnter your Admin Login Password to permanently destroy ${batchName}.`);
            if (pwd === null || pwd.trim() === "") { alert("Password required. Deletion cancelled."); return; }

            const userEmail = auth.currentUser.email;
            auth.signInWithEmailAndPassword(userEmail, pwd).then(() => {
                db.collection("Students").where("Class", "==", currentViewClass).where("Batch", "==", currentViewBatch).get().then((querySnapshot) => {
                    const firestoreBatch = db.batch();
                    querySnapshot.forEach((doc) => { firestoreBatch.delete(doc.ref); });
                    return firestoreBatch.commit(); 
                }).then(() => {
                    alert(`✅ Entire batch (${batchName}) has been permanently deleted.`);
                    switchTab('dashboard'); 
                }).catch((error) => { alert("Error deleting batch. Check internet connection."); });
            }).catch(err => { alert("❌ Incorrect Password. Batch deletion blocked."); });
        }

        // =========================================================
        // MODALS (EDIT & HISTORY)
        // =========================================================
        function openEditModal(id) {
            const student = allStudents.find(s => s.id === id);
            if(!student) return;
            document.getElementById('edit-id').value = student.id;
            document.getElementById('edit-name').value = student.Name;
            document.getElementById('edit-phone').value = student.Phone;
            document.getElementById('edit-class').value = student.Class;
            document.getElementById('edit-batch').value = student.Batch;
            document.getElementById('edit-total').value = student.TotalFee || 0;
            document.getElementById('edit-paid').value = student.PaidFee || 0;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

        function saveEdit() {
            const id = document.getElementById('edit-id').value;
            let batch = document.getElementById('edit-batch').value.trim().toUpperCase();
            if(!/^[A-Z]\d+$/.test(batch)) { alert("Invalid Batch format! Please use a letter followed by a number (e.g., A1)."); return; }
            db.collection("Students").doc(id).update({
                Name: document.getElementById('edit-name').value,
                Phone: document.getElementById('edit-phone').value,
                Class: document.getElementById('edit-class').value,
                Batch: batch,
                TotalFee: Number(document.getElementById('edit-total').value),
                PaidFee: Number(document.getElementById('edit-paid').value)
            }).then(() => {
                closeEditModal();
                alert("Student updated!");
            });
        }

        function viewHistory(studentId, studentName) {
            document.getElementById('history-title').innerText = `${studentName}'s History`;
            const listDiv = document.getElementById('history-list');
            listDiv.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">Fetching records...</div>';
            document.getElementById('history-modal').style.display = 'flex';

            db.collection("Attendance")
              .where("studentId", "==", studentId)
              .get()
              .then((snapshot) => {
                  if (snapshot.empty) {
                      listDiv.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">No attendance records found yet.</div>';
                      return;
                  }

                  let records = [];
                  snapshot.forEach(doc => records.push(doc.data()));
                  records.sort((a, b) => new Date(b.date) - new Date(a.date));

                  let presentCount = 0;
                  let totalCount = records.length;
                  let itemsHtml = '';

                  records.forEach(data => {
                      if(data.status === 'Present') presentCount++;
                      
                      const dateObj = new Date(data.date);
                      const dateStr = dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                      const statusColor = data.status === 'Present' ? 'var(--success)' : 'var(--danger)';
                      
                      itemsHtml += `
                          <div class="history-item">
                              <span style="font-weight: 600; color: #555;"><i class="fas fa-calendar-day" style="color: #ccc; margin-right: 5px;"></i>${dateStr}</span>
                              <span style="font-weight: 700; color: ${statusColor};">${data.status}</span>
                          </div>
                      `;
                  });

                  const percent = Math.round((presentCount / totalCount) * 100);
                  let percentColor = percent >= 75 ? 'var(--success)' : (percent >= 50 ? '#f59e0b' : 'var(--danger)');

                  const summaryHtml = `
                    <div style="background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; border: 1px solid #e2e8f0;">
                        <div style="font-size: 0.9rem; color: #555; font-weight: 600;">Overall Attendance</div>
                        <div style="color: ${percentColor}; font-size: 2rem; font-weight: 700; margin: 5px 0;">${percent}%</div>
                        <div style="font-size: 0.8rem; color: #888;">
                            <span style="color: var(--success); font-weight:bold;">${presentCount} Present</span> &nbsp;|&nbsp; 
                            <span style="color: var(--danger); font-weight:bold;">${totalCount - presentCount} Absent</span>
                        </div>
                    </div>
                  `;

                  listDiv.innerHTML = summaryHtml + itemsHtml;
              })
              .catch(error => {
                  console.error(error);
                  listDiv.innerHTML = '<div style="text-align: center; color: red; padding: 20px;">Error loading history.</div>';
              });
        }

        function closeHistoryModal() {
            document.getElementById('history-modal').style.display = 'none';
        }
    </script>
</body>
</html>
