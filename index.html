<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Madavoor | Since 1996</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');

        :root {
            --primary-blue: #003b8e;
            --light-blue: #0056d6;
            --dark-blue: #001f4d;
            --white: #ffffff;
            --bg-light: #f0f4f8;
            --text-dark: #1a2a3a;
            --footer-bg: #00112a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        html, body { max-width: 100%; overflow-x: hidden; background-color: var(--bg-light); color: var(--text-dark); }

        /* Navigation Bar */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 75px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.5);
        }

        .nav-logo { font-size: clamp(1.2rem, 3vw, 1.6rem); font-weight: 800; color: var(--primary-blue); text-decoration: none; letter-spacing: 1px; text-transform: uppercase;}
        .nav-menu { display: flex; align-items: center; gap: 30px; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 600; transition: color 0.3s ease; }
        .nav-links a:hover { color: var(--light-blue); }
        .nav-socials { display: flex; gap: 15px; }
        .nav-socials a { color: var(--primary-blue); font-size: 1.4rem; transition: transform 0.3s ease, color 0.3s ease; }
        .nav-socials a:hover { transform: scale(1.2) translateY(-3px); color: var(--light-blue); }
        .menu-btn { display: none; font-size: 1.8rem; color: var(--primary-blue); cursor: pointer; }

        /* Hero Section */
        .hero {
            position: relative; height: 100vh; min-height: 600px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            background: linear-gradient(135deg, var(--primary-blue), var(--light-blue), var(--dark-blue));
            background-size: 300% 300%; animation: gradientBG 15s ease infinite;
            color: var(--white); text-align: center; padding: 20px; padding-top: 75px; 
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .shape {
            position: absolute; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2); animation: float 8s ease-in-out infinite;
        }
        .shape1 { width: 120px; height: 120px; top: 15%; left: 8%; transform: rotate(45deg); border-radius: 20px; animation-delay: 0s; }
        .shape2 { width: 180px; height: 180px; bottom: 10%; right: 5%; border-radius: 50%; animation-delay: 2s; }
        .shape3 { width: 90px; height: 90px; top: 25%; right: 20%; transform: rotate(15deg); border-radius: 15px; animation-delay: 4s; }
        .shape4 { width: 60px; height: 60px; bottom: 30%; left: 15%; border-radius: 50%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3)); animation-delay: 1s;}

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-30px) rotate(15deg) scale(1.05); }
        }

        .hero-content { position: relative; z-index: 2; width: 100%; max-width: 900px; transform-style: preserve-3d; perspective: 1000px;}
        .hero-content h1 { font-size: clamp(2.5rem, 7vw, 4.5rem); font-weight: 800; margin-bottom: 15px; text-shadow: 0 15px 30px rgba(0,0,0,0.4); letter-spacing: 2px; animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform: translateZ(50px);}
        .hero-content p { font-size: clamp(1.1rem, 3vw, 1.8rem); font-weight: 300; margin-bottom: 40px; text-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideUp 1s ease-out 0.4s forwards; opacity: 0; }
        
        .btn {
            display: inline-block; padding: 15px 45px; background: var(--white); color: var(--primary-blue);
            text-decoration: none; font-weight: 700; border-radius: 50px; font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), 0 6px 0 #cbd6e2; 
            transition: all 0.2s ease; animation: slideUp 1s ease-out 0.8s forwards; opacity: 0;
            position: relative; top: 0;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.3), 0 8px 0 #cbd6e2; }
        .btn:active { top: 6px; box-shadow: 0 0 0 transparent; transform: translateY(0); } 

        /* Stats Strip */
        .stats-strip {
            display: flex; justify-content: center; gap: 50px; padding: 40px 5%;
            background: var(--white); transform: translateY(-50px);
            max-width: 1000px; margin: 0 auto; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,45,114,0.1); position: relative; z-index: 10;
        }
        .stat-item { text-align: center; }
        .stat-number { font-size: 2.5rem; font-weight: 800; color: var(--light-blue); display: block; }
        .stat-text { font-size: 1rem; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}

        /* General Sections */
        .section { padding: 40px 5% 80px; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; font-size: clamp(2rem, 5vw, 2.8rem); color: var(--primary-blue); margin-bottom: 50px; font-weight: 800; text-transform: uppercase;}

        /* 3D Cards */
        .cards-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; perspective: 1000px; }
        .tilt-card { 
            background: var(--white); padding: 40px 30px; border-radius: 20px; text-align: center; 
            border-bottom: 8px solid var(--primary-blue); box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out; transform-style: preserve-3d;
        }
        .tilt-card i { font-size: 3.5rem; color: var(--light-blue); margin-bottom: 20px; transform: translateZ(40px); display: inline-block; text-shadow: 0 10px 20px rgba(0,86,214,0.2);}
        .tilt-card h3 { font-size: 1.5rem; margin-bottom: 15px; transform: translateZ(30px); font-weight: 700;}
        .tilt-card p { color: #555; font-size: 1rem; line-height: 1.6; transform: translateZ(20px); }

        /* Forms */
        .form-container { 
            background: var(--white); padding: 50px; border-radius: 25px; 
            box-shadow: 0 25px 50px rgba(0,45,114,0.1); max-width: 800px; margin: 0 auto; 
            border: 1px solid #e1e8f0; border-top: 6px solid var(--primary-blue);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .form-group { width: 100%; }
        .form-control { 
            width: 100%; padding: 15px 20px; border: 2px solid #e1e8f0; border-radius: 12px; 
            font-size: 1rem; background: #f8fafc; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
