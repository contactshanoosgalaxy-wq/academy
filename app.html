<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Gatekeeper</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Poppins', sans-serif; }
        .container { text-align: center; width: 90%; max-width: 400px; }
        .logo { font-size: 1.5rem; font-weight: 800; color: #003b8e; margin-bottom: 30px; letter-spacing: 2px; }
        .choice-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; text-decoration: none; display: block; }
        .choice-card:hover { border-color: #003b8e; transform: translateY(-5px); }
        .choice-card i { font-size: 2.5rem; color: #0056d6; margin-bottom: 15px; }
        .choice-card h3 { margin: 0; color: #1a2a3a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ACADEMY MADAVOOR</div>
        
        <a href="student.html" class="choice-card">
            <i class="fas fa-user-graduate"></i>
            <h3>Student Portal</h3>
        </a>

        <a href="portal.html" class="choice-card">
            <i class="fas fa-user-shield"></i>
            <h3>Staff Portal</h3>
        </a>
    </div>
</body>
</html>
