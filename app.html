<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Madavoor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #ffffff; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .logo { width: 120px; margin-bottom: 20px; }
        h2 { color: #003b8e; margin-bottom: 10px; }
        p { color: #666; text-align: center; margin-bottom: 30px; }
        
        .btn-student { 
            background: #003b8e; color: white; padding: 15px 40px; 
            border-radius: 30px; text-decoration: none; font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,59,142,0.3); width: 80%; text-align: center;
        }

        footer { padding: 20px; text-align: center; border-top: 1px solid #eee; }
        .staff-link { color: #aaa; text-decoration: none; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="main-content">
        <img src="icon-180.png" class="logo" alt="Academy Logo">
        <h2>Welcome Back!</h2>
        <p>Access your classes, exams, and attendance records.</p>
        
        <a href="student.html" class="btn-student">STUDENT LOGIN</a>
    </div>

    <footer>
        <a href="portal.html" class="staff-link">STAFF ADMINISTRATION</a>
    </footer>
</body>
</html>
